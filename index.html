<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlacksonzGames | Portal</title>
    <style>
        :root {
            --primary: #00ff41; /* Matrix Green */
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 50px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            margin-bottom: 10px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 40px;
            max-width: 1200px;
        }

        .game-card {
            background: var(--card-bg);
            border: 2px solid #333;
            border-radius: 15px;
            width: 280px;
            overflow: hidden;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            position: relative;
        }

        .game-card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 255, 65, 0.2);
        }

        .thumbnail {
            width: 100%;
            height: 180px;
            background: #333; /* Placeholder color */
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .game-info {
            padding: 20px;
            text-align: center;
        }

        .play-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 20px;
            background: var(--primary);
            color: black;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1>BLACKSONZ GAMES</h1>
        <p>Experimental Game Portal</p>
    </header>

    <div class="container">
        <a href="baldi/index.html" class="game-card">
            <div class="thumbnail" style="background: linear-gradient(45deg, #4caf50, #2e7d32);">
                BALDI MOD
            </div>
            <div class="game-info">
                <h3>Baldi's Basics</h3>
                <p>Web Port - v1.0</p>
                <div class="play-btn">Play Now</div>
            </div>
        </a>

        </div>

</body>
</html>
