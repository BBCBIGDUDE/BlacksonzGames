<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chopped Cheese Rowan Games | Hub</title>
    <style>
        :root {
            --primary-glow: #00ff41; /* Neon Green */
            --secondary-glow: #ff003c; /* Cyber Red */
            --bg-color: #050505;
            --card-bg: #111;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background Gradients */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a2a1a 0%, #050505 100%);
            z-index: -1;
        }

        header {
            margin: 60px 0;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(to right, #fff, var(--primary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 255, 65, 0.5));
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 100px;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .game-card:hover {
            transform: scale(1.05) translateY(-10px);
            border-color: var(--primary-glow);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        }

        .thumb-box {
            width: 100%;
            height: 200px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #444;
            border-bottom: 1px solid #333;
        }

        .game-card:hover .thumb-box {
            color: var(--primary-glow);
        }

        .info {
            padding: 25px;
            text-align: center;
        }

        .info h3 { margin: 0 0 10px 0; font-size: 1.6rem; }
        .info p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }

        .btn {
            display: inline-block;
            padding: 12px 35px;
            background: transparent;
            border: 2px solid var(--primary-glow);
            color: var(--primary-glow);
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .game-card:hover .btn {
            background: var(--primary-glow);
            color: black;
            box-shadow: 0 0 15px var(--primary-glow);
        }
    </style>
</head>
<body>

    <header>
        <h1>Blacksonz Games</h1>
        <p style="color: #666; letter-spacing: 2px;">Rowan Chopped Cheese Dick Cheese</p>
    </header>

    <div class="container">
        <a href="baldi/index.html" class="game-card">
            <div class="thumb-box">
                BALDI MOD
            </div>
            <div class="info">
                <h3>Baldi's Basics</h3>
                <p>The classic horror mod, now fully unblocked.</p>
                <span class="btn">Play Game</span>
            </div>
        </a>

        <div class="game-card" style="opacity: 0.5; cursor: not-allowed;">
            <div class="thumb-box">COMING SOON</div>
            <div class="info">
                <h3>New Project</h3>
                <p>Development in progress...</p>
                <span class="btn" style="border-color: #555; color: #555;">Locked</span>
            </div>
        </div>
    </div>

</body>
</html>
