<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blacksonz Games | Hub</title>
    <style>
        :root {
            --primary: #00ff41; /* Cyber Green */
            --bg: #050505;
            --card-bg: #111;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Orbitron', sans-serif; /* A gamer font */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin: 50px 0;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 10px;
            color: white;
            text-shadow: 0 0 20px var(--primary);
            margin: 0;
        }

        .subtitle {
            color: #666;
            letter-spacing: 4px;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 50px;
            flex-wrap: wrap;
        }

        .game-card {
            width: 350px;
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            text-decoration: none;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .game-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.2);
        }

        .cover-img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* This makes sure the image fills the box perfectly */
            border-bottom: 1px solid #222;
            filter: grayscale(30%);
            transition: 0.4s;
        }

        .game-card:hover .cover-img {
            filter: grayscale(0%);
        }

        .details {
            padding: 25px;
            text-align: center;
        }

        .details h3 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .details p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .play-now {
            display: inline-block;
            padding: 10px 30px;
            border: 2px solid var(--primary);
            border-radius: 50px;
            color: var(--primary);
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .game-card:hover .play-now {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 20px var(--primary);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>BLACKSONZ</h1>
        <div class="subtitle">UNBLOCKED GAME ARCHIVE</div>
    </header>

    <div class="container">
        <a href="baldi/index.html" class="game-card">
            <img src="image_29dede.png" alt="Baldi Mod" class="cover-img">
            <div class="details">
                <h3>Baldi's Basics Mod</h3>
                <p>The "-b" mod. Survive the schoolhouse with new visuals.</p>
                <div class="play-now">Initialize Game</div>
            </div>
        </a>

        <div class="game-card" style="opacity: 0.4; cursor: default;">
            <div class="cover-img" style="background: #222; display: flex; align-items: center; justify-content: center; font-size: 3rem;">?</div>
            <div class="details">
                <h3>Next Project</h3>
                <p>New mod or simulator coming soon.</p>
                <div class="play-now" style="border-color: #444; color: #444;">Locked</div>
            </div>
        </div>
    </div>

</body>
</html>
